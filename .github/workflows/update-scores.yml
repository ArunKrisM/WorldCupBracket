name: Update World Cup scores

on:
  schedule:
    # every hour — well within API-Football's free 100 req/day tier (this uses 1 request per run)
    - cron: '0 * * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest scores and update index.html
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/update_scores.py

      - name: Commit and push if changed
        run: |
          git config user.name "wc26-score-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet index.html; then
            git add index.html
            git commit -m "Auto-update: latest World Cup scores"
            git push
          else
            echo "No score changes to commit."
          fi
